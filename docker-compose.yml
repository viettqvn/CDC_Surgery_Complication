services:
  api:
    build: .
    image: cdc-cci-api:latest
    ports:
      - "8000:8000"
    restart: unless-stopped

  # Reuses the exact same image as "api" (same baked-in models/mlflow.db)
  # so there is nothing to keep in sync between training and this UI --
  # just a different startup command.
  mlflow:
    image: cdc-cci-api:latest
    depends_on:
      - api
    command:
      [
        "mlflow", "server",
        "--backend-store-uri", "sqlite:////app/mlflow.db",
        "--default-artifact-root", "/app/mlruns",
        "--host", "0.0.0.0",
        "--port", "5000",
      ]
    ports:
      - "5000:5000"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
